kind = "web"
previewPath = "/"
title = "KESRIKUNJ Resort"
version = "1.0.0"
id = "artifacts/kesrikunj"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23685

[services.development]
run = "pnpm --filter @workspace/kesrikunj run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kesrikunj", "run", "build" ]
publicDir = "artifacts/kesrikunj/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23685"
BASE_PATH = "/"
